<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酸素ボンベ計算機 </title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #d35400;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        h2 {
            color: var(--primary-color);
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 5px;
        }
        .sub-title {
            font-size: 0.8rem;
            text-align: center;
            color: #666;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }
        select, input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #fff;
        }
        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .result-area {
            margin-top: 25px;
            padding: 15px;
            background-color: #fff5eb;
            border: 2px solid var(--accent-color);
            border-radius: 8px;
            text-align: center;
        }
        .result-label {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 5px;
        }
        .result-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #c0392b;
        }
        .formula-note {
            font-size: 0.75rem;
            color: #777;
            margin-top: 20px;
            padding: 10px;
            background: #eee;
            border-radius: 4px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>ECMO搬送 酸素計算機</h2>
    <div class="sub-title">【安全係数 0.8 適用済み】</div>
    
    <div class="form-group">
        <label>1. ボンベ容量 (L)</label>
        <select id="capacity">
            <option value="1.1">1.1 L </option>
            <option value="2.0" selected>2.0 L (標準)</option>
            <option value="2.9">2.9 L</option>
            <option value="5.0">5.0 L </option>
            <option value="10">10 L </option>
            <option value="20">20 L</option>
        </select>
    </div>

    <div class="form-group">
        <label>2. ボンベ残圧 (MPa)</label>
        <input type="number" id="pressure" placeholder="現在の圧力を入力" step="0.1" inputmode="decimal">
    </div>

    <div class="form-group">
        <label>3. 設定流量 (Sweep Gas Flow L/min)</label>
        <input type="number" id="flow" placeholder="例: 5.0" step="0.1" inputmode="decimal">
    </div>

    <div class="result-area">
        <div class="result-label">使用可能時間の目安</div>
        <div id="time-result" class="result-value">-- 分</div>
        <div id="hm-result" style="font-size: 1rem; font-weight: bold; margin-top: 5px; color: #333;"></div>
    </div>

    <div class="formula-note">
        <strong>計算式:</strong><br>
        (容量 × 圧力 × 10) × <strong>0.8</strong> ÷ 流量<br>
        <small>※初期値を2.0Lに設定しています。機種により異なる場合は変更してください。</small>
    </div>
</div>

<script>
    const capacityEl = document.getElementById('capacity');
    const pressureEl = document.getElementById('pressure');
    const flowEl = document.getElementById('flow');
    const timeResultEl = document.getElementById('time-result');
    const hmResultEl = document.getElementById('hm-result');

    function calculate() {
        const capacity = parseFloat(capacityEl.value);
        const pressure = parseFloat(pressureEl.value);
        const flow = parseFloat(flowEl.value);
        const safetyFactor = 0.8;

        if (capacity && pressure > 0 && flow > 0) {
            const availableOxygen = capacity * pressure * 10 * safetyFactor;
            const totalMinutes = Math.floor(availableOxygen / flow);
            
            const hours = Math.floor(totalMinutes / 60);
            const minutes = totalMinutes % 60;

            if (totalMinutes < 0) {
                timeResultEl.innerText = "0 分";
                hmResultEl.innerText = "";
                return;
            }

            timeResultEl.innerText = totalMinutes + " 分";
            if (hours > 0) {
                hmResultEl.innerText = "（約 " + hours + " 時間 " + minutes + " 分）";
            } else {
                hmResultEl.innerText = "";
            }
        } else {
            timeResultEl.innerText = "-- 分";
            hmResultEl.innerText = "";
        }
    }

    [capacityEl, pressureEl, flowEl].forEach(el => {
        el.addEventListener('input', calculate);
    });
</script>

</body>
</html>
