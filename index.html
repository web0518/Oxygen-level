<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酸素計算機 </title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --bg-color: #f4f7f6;
            --danger-color: #e74c3c;  /* 赤 */
            --warning-color: #f39c12; /* オレンジ/黄 */
            --safe-color: #27ae60;    /* 緑 */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        h2 {
            color: var(--primary-color);
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 5px;
        }
        .sub-title {
            font-size: 0.8rem;
            text-align: center;
            color: #666;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }
        select, input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .result-area {
            margin-top: 25px;
            padding: 20px;
            background-color: #fff;
            border: 3px solid #ddd;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .result-label {
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }
        .result-value {
            font-size: 2.2rem;
            font-weight: bold;
        }
        .formula-note {
            font-size: 0.75rem;
            color: #777;
            margin-top: 20px;
            padding: 10px;
            background: #eee;
            border-radius: 4px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>酸素計算機</h2>
    <div class="sub-title">【安全係数 0.8 】</div>
    
    <div class="form-group">
        <label>1. ボンベ容量 (L)</label>
        <select id="capacity">
            <option value="1.1">1.1 L </option>
            <option value="2.0" selected>2.0 L (標準)</option>
            <option value="2.9">2.9 L</option>
            <option value="5.0">5.0 L </option>
            <option value="10">10 L </option>
            <option value="20">20 L</option>
        </select>
    </div>

    <div class="form-group">
        <label>2. ボンベ残圧 (MPa)</label>
        <input type="number" id="pressure" placeholder="現在の圧力を入力" step="0.1" inputmode="decimal">
    </div>

    <div class="form-group">
        <label>3. 設定流量 (L/min)</label>
        <input type="number" id="flow" placeholder="例: 5.0" step="0.1" inputmode="decimal">
    </div>

    <div id="result-box" class="result-area">
        <div class="result-label">使用可能時間の目安</div>
        <div id="time-result" class="result-value">-- 分</div>
        <div id="hm-result" style="font-size: 1.1rem; font-weight: bold; margin-top: 5px;"></div>
    </div>

    <div class="formula-note">
        <strong>アラート基準:</strong><br>
        🔴 30分未満<br>
        🟡 30〜60分未満<br>
        🟢 60分以上<br>
        <small>※係数0.8適用後の数値で判定しています。</small>
    </div>
</div>

<script>
    const capacityEl = document.getElementById('capacity');
    const pressureEl = document.getElementById('pressure');
    const flowEl = document.getElementById('flow');
    const timeResultEl = document.getElementById('time-result');
    const hmResultEl = document.getElementById('hm-result');
    const resultBoxEl = document.getElementById('result-box');

    function calculate() {
        const capacity = parseFloat(capacityEl.value);
        const pressure = parseFloat(pressureEl.value);
        const flow = parseFloat(flowEl.value);
        const safetyFactor = 0.8;

        if (capacity && pressure > 0 && flow > 0) {
            const availableOxygen = capacity * pressure * 10 * safetyFactor;
            const totalMinutes = Math.floor(availableOxygen / flow);
            
            const hours = Math.floor(totalMinutes / 60);
            const minutes = totalMinutes % 60;

            // 色判定ロジック
            let color = "";
            let bgColor = "";

            if (totalMinutes < 30) {
                color = "#e74c3c"; // Danger Red
                bgColor = "#fdeaea";
            } else if (totalMinutes <= 60) {
                color = "#f39c12"; // Warning Orange/Yellow
                bgColor = "#fef9e7";
            } else {
                color = "#27ae60"; // Safe Green
                bgColor = "#ebf5fb";
            }

            // スタイル適用
            timeResultEl.style.color = color;
            hmResultEl.style.color = color;
            resultBoxEl.style.borderColor = color;
            resultBoxEl.style.backgroundColor = bgColor;

            timeResultEl.innerText = totalMinutes + " 分";
            if (hours > 0) {
                hmResultEl.innerText = "（約 " + hours + " 時間 " + minutes + " 分）";
            } else {
                hmResultEl.innerText = "";
            }
        } else {
            timeResultEl.innerText = "-- 分";
            timeResultEl.style.color = "#333";
            hmResultEl.innerText = "";
            resultBoxEl.style.borderColor = "#ddd";
            resultBoxEl.style.backgroundColor = "#fff";
        }
    }

    [capacityEl, pressureEl, flowEl].forEach(el => {
        el.addEventListener('input', calculate);
    });
</script>

</body>
</html>
